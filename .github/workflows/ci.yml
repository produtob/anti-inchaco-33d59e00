name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Config sanity check
        run: bun run scripts/check-config.mjs
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Build
        run: bun run build
